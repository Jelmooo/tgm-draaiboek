services:
  draaiboek:
    container_name: tgm-draaiboek
    build: .
    # Of gebruik een vooraf gebouwde image i.p.v. build:
    # image: tgm-draaiboek:latest
    restart: unless-stopped
    ports:
      # Cloudflare (Tunnel) stuurt de publieke URL naar deze poort.
      - "8095:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      # Data per app onder /DATA/APPS DATABASE (quotes nodig vanwege de spaties).
      - "/DATA/APPS DATABASE/tgm-draaiboek:/data"
