<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Draaiboek</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>" />
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner" id="appbar"></div>
  </header>

  <main id="app" class="container"></main>

  <!-- Bottom sheet -->
  <div id="sheet-overlay" class="sheet-overlay hidden">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <div class="sheet-head"><h2 id="sheet-title"></h2></div>
      <div id="sheet-body" class="sheet-body"></div>
      <div id="sheet-foot" class="sheet-foot"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
